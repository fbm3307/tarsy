defaults:
  llm_provider: "test-provider"
  llm_backend: "google-native"

mcp_servers:
  test-mcp:
    transport:
      type: stdio
      command: mock
  # Built-in KubernetesAgent requires this server for validation.
  kubernetes-server:
    transport:
      type: stdio
      command: mock

agents:
  Investigator:
    mcp_servers: [test-mcp]
    custom_instructions: "You are Investigator, gathering evidence about the alert."
  Remediator:
    # type: action → uses IteratingController (same as default) but injects
    # safety preamble ("require hard evidence", "prefer inaction", etc.) and
    # causes the stage to be persisted as stage_type=action in the DB.
    type: action
    mcp_servers: [test-mcp]
    custom_instructions: "You are Remediator, executing justified remediation actions."

agent_chains:
  action-chain:
    alert_types: [test-action]
    executive_summary_provider: "test-provider"
    stages:
      # Stage 1: standard investigation — gathers evidence via MCP tools.
      - name: investigation
        agents:
          - name: Investigator
      # Stage 2: action — receives investigation context, decides whether
      # to act. Stage type is derived as "action" because all agents in
      # this stage have type=action.
      - name: remediation
        agents:
          - name: Remediator
