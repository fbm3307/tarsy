name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.7'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8.0
          args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.7'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build application
        run: make build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tarsy-binary
          path: bin/tarsy
          retention-days: 7

  test-go:
    name: Test Go Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.7'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Initialize PostgreSQL extensions
        run: |
          PGPASSWORD=test psql -h localhost -U test -d test -c "CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"
          PGPASSWORD=test psql -h localhost -U test -d test -c "CREATE EXTENSION IF NOT EXISTS \"pg_trgm\";"
          PGPASSWORD=test psql -h localhost -U test -d test -c "CREATE EXTENSION IF NOT EXISTS \"vector\";"

      - name: Run Go tests
        env:
          # checkov:skip=CKV_SECRET_4 - test-only credentials for ephemeral CI postgres
          CI_DATABASE_URL: postgresql://test:test@localhost:5432/test?sslmode=disable
        run: make test-go

      - name: Upload Go coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          flags: go
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  test-dashboard:
    name: Test Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache-dependency-path: web/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: web/dashboard
        run: npm ci

      - name: Run dashboard tests and type check
        run: make test-dashboard

  test-python:
    name: Test Python LLM Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        working-directory: llm-service
        run: uv sync --extra test

      - name: Run Python tests
        run: make test-llm-coverage

      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: llm-service/coverage.xml
          flags: python
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
